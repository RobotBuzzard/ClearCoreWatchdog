author=RobotBuzzard
maintainer=RobotBuzzard <buzzy@reasonablerobot.io>
sentence=Hardware watchdog timer for the Teknic ClearCore (Microchip SAME53N19A).
paragraph=Direct CMSIS register access to the SAMD51/SAME53 WDT block. Teknic's ClearCore Arduino library does not expose any watchdog API; this fills the gap. Bench-validated on a real ClearCore — deliberate-hang test confirms automatic reset within the configured timeout, bracketed long operations do not trigger spurious resets. Configurable timeouts from 1s to 16s (default 8s), reset-cause introspection via RSTC.RCAUSE.
